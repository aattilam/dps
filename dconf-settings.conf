pinned-app-list=['Fájlok', '', 'org.gnome.Nautilus.desktop', 'Terminál', '', 'org.gnome.Terminal.desktop', 'Firefox', '', 'firefox.desktop', 'Szövegszerkesztő', '', 'org.gnome.TextEditor.desktop', 'Kiterjesztések', '', 'org.gnome.Extensions.desktop', 'Rendszerfigyelő', '', 'org.gnome.SystemMonitor.desktop', 'LibreOffice', '', 'libreoffice-startcenter.desktop']
